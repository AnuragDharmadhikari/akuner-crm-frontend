server {
    listen 80;
    server_name localhost;

    # Serve static files from the Vite build output
    root /usr/share/nginx/html;
    index index.html;

    # API proxy — forward all /api requests to the backend
    # This means the frontend never needs to know the backend URL
    # In production, Nginx handles routing between frontend and backend
    location /api/ {
        proxy_pass http://akuner_app_prod:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React Router — all non-file requests serve index.html
    # Without this, refreshing /dashboard returns 404
    # because Nginx looks for a file called "dashboard" which doesn't exist
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    # Vite adds content hashes to filenames so cache-busting is automatic
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}